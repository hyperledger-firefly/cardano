
name: Run demo

on:
  pull_request:

jobs:
  demo:
    name: Run Demo
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Add wallet secret
        run: mkdir ./infra/wallet ; echo '${{ secrets.DEMO_WALLET }}' > ./infra/wallet/addr_test1vqhkukz0285zvk0xrwk9jlq0075tx6furuzcjvzpnhtgelsuhhqc4.skey
      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1.17.0
        with:
          toolchain: stable
          target: wasm32-unknown-unknown
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Docker login
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build cardanoconnect image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: ./
          file: ./Dockerfile
          load: true
          platforms: linux/amd64
          provenance: false
          target: firefly-cardanoconnect
          tags: ghcr.io/hyperledger-firefly/cardanoconnect:main
          cache-from: type=registry,ref=ghcr.io/${{ github.repository }}:buildcache
      - name: Build cardanosigner image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: ./
          file: ./Dockerfile
          load: true
          platforms: linux/amd64
          provenance: false
          target: firefly-cardanosigner
          tags: ghcr.io/hyperledger-firefly/cardanosigner:main
          cache-from: type=registry,ref=ghcr.io/${{ github.repository }}:buildcache
      - name: Start docker-compose
        run: docker compose -f ./infra/docker-compose.node.yaml -p preview up -d
      - name: Logs
        if: always()
        run: |
          docker compose -f ./infra/docker-compose.node.yaml -p preview logs
          docker ps -a
      - name: Run demo
        env:
          ADDR_FROM: addr_test1vqhkukz0285zvk0xrwk9jlq0075tx6furuzcjvzpnhtgelsuhhqc4
          ADDR_TO: addr_test1vqeux7xwusdju9dvsj8h7mca9aup2k439kfmwy773xxc2hcu7zy99
        run: make demo
