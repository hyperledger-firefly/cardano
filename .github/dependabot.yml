version: 2
updates:
  # Rust / Cargo workspace (single Cargo.lock at repo root)
  - package-ecosystem: cargo
    directories:
      - "/"
      - "/wasm/simple-tx/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      cargo:
        # Group all non-security version updates into one PR
        applies-to: version-updates
        exclude-patterns:
          - "minicbor"      # stuck on an older version for compatibility with pallas
          - "rusqlite"      # stuck on an older version for compatibility with refinery
          - "schemars"      # stuck on an older version for compatibility with aide
          - "utxorpc-spec"  # stuck on an older version for compatibility with balius
        patterns:
          - "*"
      cargo-security:
        # Group all security updates into one PR
        applies-to: security-updates
        patterns:
          - "*"

  # GitHub Actions used by workflows in .github/workflows
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      github-actions:
        applies-to: version-updates
        patterns:
          - "*"
      github-actions-security:
        applies-to: security-updates
        patterns:
          - "*"

  # Container base images (Dockerfile at repo root)
  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      docker:
        applies-to: version-updates
        patterns:
          - "*"
      docker-security:
        applies-to: security-updates
        patterns:
          - "*"
